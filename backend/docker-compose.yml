services:
  db:
    image: postgres:16-alpine
    container_name: nimbus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nimbus
      POSTGRES_PASSWORD: nimbus
      POSTGRES_DB: nimbus
    ports:
      - '5432:5432'
    volumes:
      - nimbus_pg_data:/var/lib/postgresql/data

volumes:
  nimbus_pg_data:
